<div class="px-12 max-w-7xl mx-auto">
<!-- Page Header -->
<div class="mb-12">
<h1 class="text-5xl font-extrabold tracking-tight text-on-surface font-manrope">Submissions</h1>
</div>
<!-- Dashboard Content: Data Table -->
<div class="bg-surface-container-lowest rounded-xl shadow-sm border border-surface-container overflow-hidden">
<table class="w-full text-left border-collapse">
<thead>
<tr class="bg-surface-container/50">
<th class="px-8 py-5 text-xs font-bold uppercase tracking-widest text-on-surface-variant font-manrope">ID</th>
<th class="px-8 py-5 text-xs font-bold uppercase tracking-widest text-on-surface-variant font-manrope">File Path</th>
<th class="px-8 py-5 text-xs font-bold uppercase tracking-widest text-on-surface-variant font-manrope">Status</th>
<th class="px-8 py-5 text-xs font-bold uppercase tracking-widest text-on-surface-variant font-manrope text-right">Actions</th>
</tr>
</thead>
<tbody id="submissionsTable" class="divide-y divide-surface-container">
<!-- Rows will be populated by JavaScript -->
</tbody>
</table>

<script>
function escapeHtml(text) {
  return String(text)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function getStatusBadge(status, error = '') {
  const statusLower = String(status || '').toLowerCase();

  if (statusLower === 'failed') {
    const safeError = escapeHtml(String(error || 'No error message'));
    return `<button type="button" data-error="${safeError}" class="failed-badge inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200 hover:bg-red-200 dark:hover:bg-red-800">Failed</button>`;
  } else if (statusLower === 'approved') {
    return `<span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200">Approved</span>`;
  } else {
    // pending, downloading, ready - all grey
    return `<span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-200">${status.charAt(0).toUpperCase() + status.slice(1)}</span>`;
  }
}

function truncateUrl(url, maxLength = 60) {
  if (url.length > maxLength) {
    return url.substring(0, maxLength) + '...';
  }
  return url;
}

async function loadSubmissions() {
  try {
    const response = await fetch('/admin/all');
    if (!response.ok) {
      alert('Failed to load submissions');
      return;
    }
    
    const submissions = await response.json();
    const tbody = document.getElementById('submissionsTable');
    tbody.innerHTML = '';
    
    if (submissions.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" class="px-8 py-10 text-center text-on-surface-variant">No submissions found</td></tr>';
      return;
    }
    
    submissions.forEach(video => {
      const row = document.createElement('tr');
      row.className = 'group hover:bg-surface-container-low transition-colors';
      
      const statusBadge = getStatusBadge(video.status, video.error);

      row.innerHTML = `
        <td class="px-8 py-6 text-sm font-medium text-on-surface-variant font-body">${video.id}</td>
        <td class="px-8 py-6 text-sm font-mono text-on-surface-variant">${video.file_path || '—'}</td>
        <td class="px-8 py-6">
          ${statusBadge}
        </td>
        <td class="px-8 py-6 text-right">
          <div class="flex items-center justify-end gap-3">
            <a href="${video.url}" target="_blank" class="px-4 py-2 text-sm font-semibold text-secondary hover:bg-surface-container rounded-lg transition-all active:scale-95 flex items-center gap-2">
              <span class="material-symbols-outlined text-lg" data-icon="visibility">visibility</span>
              View
            </a>
            ${video.status === 'approved'
              ? `<button disabled class="px-5 py-2 text-sm font-semibold bg-surface-container text-on-surface-variant rounded-lg flex items-center gap-2 cursor-not-allowed opacity-50">
              <span class="material-symbols-outlined text-lg">check_circle</span>
              Approved
            </button>`
              : `<button onclick="approveVideo(${video.id})" class="px-5 py-2 text-sm font-semibold bg-primary text-on-primary rounded-lg shadow-sm hover:shadow-md transition-all active:scale-95 flex items-center gap-2">
              <span class="material-symbols-outlined text-lg" data-icon="check_circle">check_circle</span>
              Approve
            </button>`}
            <button onclick="removeSubmission(${video.id}, this)" class="px-4 py-2 text-sm font-semibold text-error hover:bg-red-50 rounded-lg transition-all active:scale-95 flex items-center gap-2">
              <span class="material-symbols-outlined text-lg">delete</span>
              Remove
            </button>
          </div>
        </td>
      `;
      
      tbody.appendChild(row);

      const failedBadge = row.querySelector('.failed-badge');
      if (failedBadge) {
        failedBadge.addEventListener('click', () => {
          showErrorModal(video.error || 'No error message');
        });
      }
    });
  } catch (error) {
    console.error('Error loading submissions:', error);
    alert('Error loading submissions');
  }
}

async function removeSubmission(id, btn) {
  if (!confirm('Remove this submission?')) return;
  btn.disabled = true;
  try {
    const response = await fetch(`/admin/submissions/${id}`, { method: 'DELETE' });
    if (!response.ok) { alert('Failed to remove submission'); btn.disabled = false; return; }
    btn.closest('tr').remove();
  } catch (error) {
    console.error('Error removing submission:', error);
    alert('Error removing submission');
    btn.disabled = false;
  }
}

async function approveVideo(videoId) {
  try {
    const response = await fetch(`/admin/approve/${videoId}`, { method: 'POST' });
    if (!response.ok) {
      alert('Failed to approve video');
      return;
    }
    
    // Reload submissions after approval
    loadSubmissions();
  } catch (error) {
    console.error('Error approving video:', error);
    alert('Error approving video');
  }
}

// Error modal helpers
function showErrorModal(errorText) {
  const modal = document.getElementById('errorModal');
  const content = document.getElementById('errorModalContent');
  if (!modal || !content) return;
  const cleaned = String(errorText || 'No error message available.').trim();
  content.textContent = cleaned;
  modal.classList.remove('hidden');
}

function closeErrorModal() {
  const modal = document.getElementById('errorModal');
  if (!modal) return;
  modal.classList.add('hidden');
}

document.addEventListener('DOMContentLoaded', loadSubmissions);
</script>

<div id="errorModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4">
  <div class="relative bg-white dark:bg-slate-900 rounded-2xl shadow-xl w-1/2 max-h-[80vh] overflow-auto p-6">
    <button type="button" onclick="closeErrorModal()" class="absolute right-4 top-4 text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200 text-xl font-bold">&times;</button>
    <h3 class="text-xl font-semibold text-on-surface dark:text-white mb-4">Error details</h3>
    <div id="errorModalContent" class="font-mono text-sm leading-relaxed text-on-surface dark:text-slate-100 bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-md p-4 whitespace-pre-wrap"></div>
  </div>
</div>
