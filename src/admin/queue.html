<body class="bg-surface text-on-surface antialiased min-h-screen">
<!-- SideNavBar Shell -->
<aside class="h-screen w-64 fixed left-0 top-0 border-r border-slate-200 bg-white dark:bg-slate-900 flex flex-col p-6 z-20">
<div class="mb-10">
<h2 class="text-xl font-bold tracking-tight text-on-surface font-manrope">Admin Panel</h2>
</div>
<nav class="flex-1 space-y-2">
<!-- Active Navigation: Submissions -->
<a class="flex items-center gap-3 p-3 text-on-surface-variant hover:bg-surface-container transition-all duration-200 ease-in-out rounded-lg" href="submissions">
<span class="material-symbols-outlined" data-icon="hourglass_empty">description</span>

<!-- Link to Queue -->


<a class="flex items-center gap-3 p-3 bg-primary/10 text-primary font-semibold rounded-lg transition-all duration-200 ease-in-out" href="queue">
<span class="material-symbols-outlined" data-icon="description">hourglass_empty</span>

<div class="px-12 max-w-7xl mx-auto">
<!-- Page Header -->

<h1 class="text-5xl font-extrabold tracking-tight text-on-surface font-manrope">Queue</h1>
</div>
<!-- Control Bar -->
<div class="flex items-center justify-between mb-8 bg-surface-container-low p-4 rounded-xl">
<div class="flex items-center gap-3">
<button id="playPauseBtn" onclick="togglePlayPause()" class="flex items-center gap-2 px-6 py-2.5 bg-surface-container-lowest text-primary font-bold rounded-lg shadow-sm hover:bg-primary hover:text-on-primary transition-all duration-300">

<span id="playPauseLabel">Play</span>
</button>
<button onclick="skipVideo()" class="flex items-center gap-2 px-6 py-2.5 bg-surface-container-lowest text-on-surface-variant font-semibold rounded-lg shadow-sm hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined">skip_next</span>
Skip
</button>
<button disabled class="flex items-center gap-2 px-6 py-2.5 bg-surface-container-lowest text-on-surface-variant/40 font-semibold rounded-lg shadow-sm cursor-not-allowed">
<span class="material-symbols-outlined">rebase_edit</span>
Bump Loop
</button>
</div>
<div class="flex items-center gap-4 text-xs font-bold text-on-surface-variant uppercase tracking-widest px-4">
<span id="liveIndicator" class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-gray-400"></span> Idle</span>
</div>
</div>
<!-- Now Playing -->
<div id="now-playing-card" class="hidden mb-8 bg-primary/5 border border-primary/20 rounded-xl px-6 py-4 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
    <span class="text-xs font-bold uppercase tracking-widest text-primary">Now Playing</span>
    <span id="now-playing-path" class="text-sm font-mono text-on-surface-variant truncate max-w-xs"></span>
  </div>
  <span id="now-playing-countdown" class="text-2xl font-bold font-mono text-on-surface tabular-nums">--:--</span>
</div>
<!-- Dashboard Content: Data Table -->
<div class="bg-surface-container-lowest rounded-xl shadow-sm border border-surface-container overflow-hidden">
<table class="w-full text-left border-collapse">
<thead>
<tr class="bg-surface-container/50">
<th class="px-8 py-5 text-xs font-bold uppercase tracking-widest text-on-surface-variant font-manrope">Queue ID</th>
<th class="px-8 py-5 text-xs font-bold uppercase tracking-widest text-on-surface-variant font-manrope">Media ID</th>
<th class="px-8 py-5 text-xs font-bold uppercase tracking-widest text-on-surface-variant font-manrope">File Path</th>
<th class="px-8 py-5 text-xs font-bold uppercase tracking-widest text-on-surface-variant font-manrope">URL</th>
<th class="px-8 py-5 text-xs font-bold uppercase tracking-widest text-on-surface-variant font-manrope w-36">Added</th>
</tr>
</thead>

<!-- Rows populated by JS -->
</tbody>

<br>
<br>
<script>
let isPlaying = false;
let currentState = null;
let countdownInterval = null;

function fmtTime(secs) {
  if (secs == null || secs < 0) secs = 0;
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60);
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function startCountdown() {
  if (countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(() => {
    if (!currentState || !currentState.playing || !currentState.duration) return;
    const elapsed = (Date.now() - currentState.startedAt) / 1000;
    const remaining = currentState.duration - elapsed;
    document.getElementById('now-playing-countdown').textContent = fmtTime(remaining);
  }, 500);
}

function updateNowPlaying(s) {
  const card = document.getElementById('now-playing-card');
  const path = document.getElementById('now-playing-path');
  const countdown = document.getElementById('now-playing-countdown');
  if (s.playing && s.filePath) {
    card.classList.remove('hidden');
    path.textContent = s.filePath.split('/').pop();
    const elapsed = (Date.now() - s.startedAt) / 1000;
    const remaining = (s.duration ?? 0) - elapsed;
    countdown.textContent = fmtTime(remaining);
  } else {
    card.classList.add('hidden');
    if (countdownInterval) clearInterval(countdownInterval);
  }
}

function updatePlayPauseBtn(playing) {
  isPlaying = playing;
  const icon = document.getElementById('playPauseIcon');
  const label = document.getElementById('playPauseLabel');
  const indicator = document.getElementById('liveIndicator');
  if (playing) {
    icon.textContent = 'pause_circle';
    label.textContent = 'Pause';
    indicator.innerHTML = '<span class="w-2 h-2 rounded-full bg-green-500"></span> Live';
  } else {
    icon.textContent = 'play_circle';
    label.textContent = 'Play';
    indicator.innerHTML = '<span class="w-2 h-2 rounded-full bg-gray-400"></span> Idle';
  }
}

async function togglePlayPause() {
  try {
    const endpoint = isPlaying ? '/admin/pause' : '/admin/play';
    await fetch(endpoint, { method: 'POST' });
    // UI update driven by socket 'state' event, not here
  } catch (err) {
    console.error('Error toggling play/pause:', err);
  }
}

async function skipVideo() {
  try {
    await fetch('/admin/skip', { method: 'POST' });
    loadQueue();
  } catch (err) {
    console.error('Error skipping:', err);
  }
}

function formatDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  const hour = String(d.getHours()).padStart(2, '0');
  const min = String(d.getMinutes()).padStart(2, '0');
  return `${year}-${month}-${day} ${hour}:${min}`;
}

function truncate(str, max = 50) {
  return str && str.length > max ? str.substring(0, max) + '...' : (str || '—');
}

async function loadPlaybackState() {
  try {
    const res = await fetch('/admin/playback-state');
    if (!res.ok) return;
    const s = await res.json();
    currentState = s;
    updatePlayPauseBtn(s.playing);
    updateNowPlaying(s);
    if (s.playing) startCountdown();
  } catch (err) {
    console.error('Error loading playback state:', err);
  }
}

async function loadQueue() {
  try {
    const res = await fetch('/admin/queue-data');
    if (!res.ok) return;
    const items = await res.json();
    const tbody = document.getElementById('queueTable');
    tbody.innerHTML = '';

    if (items.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="px-8 py-10 text-center text-on-surface-variant">Queue is empty</td></tr>';
      return;
    }

    items.forEach(item => {
      const row = document.createElement('tr');
      row.className = 'group hover:bg-surface-container-low transition-colors';
      row.innerHTML = `
        <td class="px-8 py-6 text-sm font-medium text-on-surface-variant font-body">${item.id}</td>
        <td class="px-8 py-6 text-sm font-medium text-on-surface-variant font-body">${item.media_id}</td>
        <td class="px-8 py-6 text-sm font-mono text-on-surface-variant">${item.file_path || '—'}</td>
        <td class="px-8 py-6">
          <a href="${item.url}" target="_blank" class="text-sm text-primary hover:underline font-medium break-all">${truncate(item.url, 35)}</a>
        </td>
        <td class="px-8 py-6 text-sm text-on-surface-variant whitespace-nowrap">${formatDate(item.added_at)}</td>
      `;
      tbody.appendChild(row);
    });
  } catch (err) {
    console.error('Error loading queue:', err);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  loadPlaybackState();
  loadQueue();

  const socket = io();
  socket.on('state', (s) => {
    currentState = s;
    updatePlayPauseBtn(s.playing);
    updateNowPlaying(s);
    if (s.playing) startCountdown();
  });
});
</script>
</body></html>
