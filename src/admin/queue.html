<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

              "surface-dim": "#ccdbf3",

              "on-surface-variant": "#454652",
              "outline-variant": "#c5c5d4",
              "primary": "#3324bc",
              "on-primary": "#ffffff",
              "error": "#ba1a1a",
              "surface-container-highest": "#d5e3fc",
              "on-tertiary": "#ffffff",
              "surface-container-low": "#eff4ff",
              "on-secondary-container": "#51577f",
              "secondary-fixed": "#dee0ff",
              "surface-container-high": "#dce9ff",
              "background": "#f8f9ff",
              "tertiary": "#6c3400",
              "on-surface": "#0d1c2e",
              "on-primary-fixed": "#100069",
              "surface-container": "#e6eeff",
              "on-surface-variant-dim": "#757684",
              "on-primary-container": "#d1cdff",
              "inverse-primary": "#c3c0ff",
              "secondary": "#565c84",
              "inverse-surface": "#233144",
              "on-tertiary-fixed-variant": "#713700",
              "inverse-on-surface": "#eaf1ff",
              "on-tertiary-fixed": "#301400",
              "surface-variant": "#d5e3fc",
              "outline": "#757684",
              "on-secondary-fixed": "#12183d",
              "on-secondary": "#ffffff",
              "on-primary-fixed-variant": "#372abf",
              "surface-tint": "#5148d7",
              "on-error": "#ffffff",
              "surface-container-lowest": "#ffffff",
              "on-error-container": "#93000a",
              "tertiary-fixed": "#ffdcc6",
              "primary-container": "#4c43d3",
              "surface-bright": "#f8f9ff",
              "error-container": "#ffdad6",
              "primary-fixed-dim": "#c3c0ff",
              "secondary-container": "#c9cffd",
              "on-background": "#0d1c2e",
              "tertiary-container": "#8f4700",
              "on-tertiary-container": "#ffc7a2",
              "primary-fixed": "#e3dfff"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, .font-manrope { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen">
<!-- SideNavBar Shell -->
<aside class="h-screen w-64 fixed left-0 top-0 border-r border-slate-200 bg-white dark:bg-slate-900 flex flex-col p-6 z-20">
<div class="mb-10">
<h2 class="text-xl font-bold tracking-tight text-on-surface font-manrope">Admin Panel</h2>
</div>
<nav class="flex-1 space-y-2">
<a class="flex items-center gap-3 p-3 text-on-surface-variant hover:bg-surface-container transition-all duration-200 ease-in-out rounded-lg" href="submissions">
<span class="material-symbols-outlined">description</span>
<span class="font-manrope text-sm font-medium">Submissions</span>
</a>
<a class="flex items-center gap-3 p-3 text-on-surface-variant hover:bg-surface-container transition-all duration-200 ease-in-out rounded-lg" href="bumps">
<span class="material-symbols-outlined">movie</span>
<span class="font-manrope text-sm font-medium">Bumps</span>
</a>
<!-- Active Navigation: Queue -->
<a class="flex items-center gap-3 p-3 bg-primary/10 text-primary font-semibold rounded-lg transition-all duration-200 ease-in-out" href="queue">
<span class="material-symbols-outlined">hourglass_empty</span>
<span class="font-manrope text-sm font-medium">Queue</span>
</a>
<!-- Link to Stats -->
<a class="flex items-center gap-3 p-3 text-on-surface-variant hover:bg-surface-container transition-all duration-200 ease-in-out rounded-lg" href="stats">
<span class="material-symbols-outlined">bar_chart</span>
<span class="font-manrope text-sm font-medium">Stats</span>
</a>
<a class="flex items-center gap-3 p-3 text-on-surface-variant hover:bg-surface-container transition-all duration-200 ease-in-out rounded-lg" href="chat">
<span class="material-symbols-outlined">forum</span>
<span class="font-manrope text-sm font-medium">Chat Log</span>
</a>
</nav>
</aside>
<!-- TopNavBar Shell (Simplified for consistency) -->
<header class="fixed top-0 right-0 w-[calc(100%-16rem)] z-10 bg-surface/80 backdrop-blur-md flex justify-between items-center px-12 py-4 h-16 border-b border-surface-container">
<div class="flex items-center flex-1"></div>
</header>
<!-- Main Content Canvas -->
<main class="pt-24 pl-64 min-h-screen">
<div class="px-12 max-w-7xl mx-auto">
<!-- Page Header -->
<div class="mb-12 flex items-baseline gap-4">
<h1 class="text-5xl font-extrabold tracking-tight text-on-surface font-manrope">Queue</h1>
<span id="queue-count" class="text-2xl font-bold text-on-surface-variant font-manrope"></span>
</div>
<!-- Control Bar -->
<div class="flex items-center justify-between mb-8 bg-surface-container-low p-4 rounded-xl">
<div class="flex items-center gap-3">
<button id="playPauseBtn" onclick="togglePlayPause()" class="flex items-center gap-2 px-6 py-2.5 bg-surface-container-lowest text-primary font-bold rounded-lg shadow-sm hover:bg-primary hover:text-on-primary transition-all duration-300">
<span id="playPauseIcon" class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_circle</span>
<span id="playPauseLabel">Play</span>
</button>
<button onclick="skipVideo()" class="flex items-center gap-2 px-6 py-2.5 bg-surface-container-lowest text-on-surface-variant font-semibold rounded-lg shadow-sm hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined">skip_next</span>
Skip
</button>
<button id="bumpLoopBtn" onclick="toggleBumpLoop()" class="flex items-center gap-2 px-6 py-2.5 bg-surface-container-lowest text-on-surface-variant font-semibold rounded-lg shadow-sm hover:bg-surface-container-high transition-all">
<span id="bumpLoopIcon" class="material-symbols-outlined">rebase_edit</span>
<span id="bumpLoopLabel">Bump Loop</span>
</button>
<button onclick="shuffleQueue()" class="flex items-center gap-2 px-6 py-2.5 bg-surface-container-lowest text-on-surface-variant font-semibold rounded-lg shadow-sm hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined">shuffle</span>
Shuffle
</button>
<button onclick="clearQueue()" class="flex items-center gap-2 px-6 py-2.5 bg-surface-container-lowest text-error font-semibold rounded-lg shadow-sm hover:bg-red-50 transition-all">
<span class="material-symbols-outlined">delete_sweep</span>
Clear Queue
</button>
</div>
<div class="flex items-center gap-4 text-xs font-bold text-on-surface-variant uppercase tracking-widest px-4">
<span id="liveIndicator" class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-gray-400"></span> Idle</span>
</div>
</div>
<!-- Now Playing -->
<div id="now-playing-card" class="hidden mb-8 bg-primary/5 border border-primary/20 rounded-xl px-6 py-4 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
    <span class="text-xs font-bold uppercase tracking-widest text-primary">Now Playing</span>
    <span id="now-playing-title" class="text-sm font-semibold text-on-surface truncate max-w-xs"></span>
    <span id="now-playing-channel" class="text-xs text-on-surface-variant truncate max-w-xs"></span>
  </div>
  <span id="now-playing-countdown" class="text-2xl font-bold font-mono text-on-surface tabular-nums">--:--</span>
</div>
<!-- Dashboard Content: Data Table -->
<div class="bg-surface-container-lowest rounded-xl shadow-sm border border-surface-container overflow-hidden">
<table class="w-full text-left border-collapse">
<thead>
<tr class="bg-surface-container/50">
<th class="px-4 py-5 text-xs font-bold uppercase tracking-widest text-on-surface-variant font-manrope w-16">ID</th>
<th class="px-8 py-5 text-xs font-bold uppercase tracking-widest text-on-surface-variant font-manrope w-full">Title</th>
<th class="px-8 py-5 text-xs font-bold uppercase tracking-widest text-on-surface-variant font-manrope whitespace-nowrap">Added</th>
<th class="px-8 py-5 text-xs font-bold uppercase tracking-widest text-on-surface-variant font-manrope text-right">Actions</th>
</tr>
</thead>
<tbody id="queueTable" class="divide-y divide-surface-container">
<!-- Rows populated by JS -->
</tbody>
</table>
</div>
</div>
</main>
<br>
<br>
<script>
function escapeHtml(text) {
  return String(text ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

let isPlaying = false;
let currentState = null;
let countdownInterval = null;

function fmtTime(secs) {
  if (secs == null || secs < 0) secs = 0;
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60);
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function startCountdown() {
  if (countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(() => {
    if (!currentState || !currentState.playing || !currentState.duration) return;
    const elapsed = (Date.now() - currentState.startedAt) / 1000;
    const remaining = currentState.duration - elapsed;
    document.getElementById('now-playing-countdown').textContent = fmtTime(remaining);
  }, 500);
}

function updateNowPlaying(s) {
  const card = document.getElementById('now-playing-card');
  const titleEl = document.getElementById('now-playing-title');
  const channelEl = document.getElementById('now-playing-channel');
  const countdown = document.getElementById('now-playing-countdown');
  if (s.playing && s.filePath) {
    card.classList.remove('hidden');
    titleEl.textContent = s.title || s.filePath.split('/').pop();
    channelEl.textContent = s.channel || '';
    const elapsed = (Date.now() - s.startedAt) / 1000;
    const remaining = (s.duration ?? 0) - elapsed;
    countdown.textContent = fmtTime(remaining);
  } else {
    card.classList.add('hidden');
    if (countdownInterval) clearInterval(countdownInterval);
  }
}

function updatePlayPauseBtn(playing) {
  isPlaying = playing;
  const icon = document.getElementById('playPauseIcon');
  const label = document.getElementById('playPauseLabel');
  const indicator = document.getElementById('liveIndicator');
  if (playing) {
    icon.textContent = 'pause_circle';
    label.textContent = 'Pause';
    indicator.innerHTML = '<span class="w-2 h-2 rounded-full bg-green-500"></span> Live';
  } else {
    icon.textContent = 'play_circle';
    label.textContent = 'Play';
    indicator.innerHTML = '<span class="w-2 h-2 rounded-full bg-gray-400"></span> Idle';
  }
}

async function togglePlayPause() {
  try {
    const endpoint = isPlaying ? '/admin/pause' : '/admin/play';
    await fetch(endpoint, { method: 'POST' });
    // UI update driven by socket 'state' event, not here
  } catch (err) {
    console.error('Error toggling play/pause:', err);
  }
}

async function skipVideo() {
  try {
    await fetch('/admin/skip', { method: 'POST' });
    loadQueue();
  } catch (err) {
    console.error('Error skipping:', err);
  }
}

async function deleteQueueEntry(id, btn) {
  btn.disabled = true;
  try {
    const res = await fetch(`/admin/queue/${id}`, { method: 'DELETE' });
    if (!res.ok) { alert('Failed to remove entry'); btn.disabled = false; return; }
    btn.closest('tr').remove();
  } catch (err) {
    console.error('Error deleting queue entry:', err);
    btn.disabled = false;
  }
}

async function clearQueue() {
  if (!confirm('Clear the entire queue? This cannot be undone.')) return;
  try {
    const res = await fetch('/admin/clear-queue', { method: 'POST' });
    const data = await res.json();
    if (!res.ok) { alert(data.error || 'Failed to clear queue'); return; }
    loadQueue();
  } catch (err) {
    console.error('Error clearing queue:', err);
  }
}

async function shuffleQueue() {
  try {
    const res = await fetch('/admin/shuffle-queue', { method: 'POST' });
    const data = await res.json();
    if (!res.ok) { alert(data.error || 'Failed to shuffle queue'); return; }
    loadQueue();
  } catch (err) {
    console.error('Error shuffling queue:', err);
  }
}

async function toggleBumpLoop() {
  if (currentState?.bumpLoopMode) {
    try {
      await fetch('/admin/play', { method: 'POST' });
    } catch (err) {
      console.error('Error stopping bump loop:', err);
    }
    return;
  }
  try {
    const res = await fetch('/admin/bump-loop', { method: 'POST' });
    const data = await res.json();
    if (!res.ok) {
      alert(data.error || 'Failed to start bump loop');
      return;
    }
    loadQueue();
  } catch (err) {
    console.error('Error starting bump loop:', err);
  }
}

function updateBumpLoopBtn(bumpLoopMode) {
  const btn = document.getElementById('bumpLoopBtn');
  const icon = document.getElementById('bumpLoopIcon');
  const label = document.getElementById('bumpLoopLabel');
  if (!btn) return;
  if (bumpLoopMode) {
    icon.textContent = 'stop_circle';
    label.textContent = 'Stop';
    btn.classList.add('text-error');
    btn.classList.remove('text-on-surface-variant');
  } else {
    icon.textContent = 'rebase_edit';
    label.textContent = 'Bump Loop';
    btn.classList.remove('text-error');
    btn.classList.add('text-on-surface-variant');
  }
}

async function startBumpLoop() {
  try {
    const res = await fetch('/admin/bump-loop', { method: 'POST' });
    const data = await res.json();
    if (!res.ok) {
      alert(data.error || 'Failed to start bump loop');
      return;
    }
    loadQueue();
  } catch (err) {
    console.error('Error starting bump loop:', err);
  }
}

function formatDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  const hour = String(d.getHours()).padStart(2, '0');
  const min = String(d.getMinutes()).padStart(2, '0');
  return `${year}-${month}-${day} ${hour}:${min}`;
}

function truncate(str, max = 50) {
  return str && str.length > max ? str.substring(0, max) + '...' : (str || '—');
}

function highlightCurrentRow() {
  const id = currentState?.currentVideoId ?? null;
  document.querySelectorAll('#queueTable tr[data-queue-id]').forEach(row => {
    const isPlaying = id !== null && Number(row.dataset.queueId) === id;
    row.classList.toggle('bg-primary/10', isPlaying);
    row.classList.toggle('hover:bg-primary/15', isPlaying);
    row.classList.toggle('hover:bg-surface-container-low', !isPlaying);
    row.style.boxShadow = isPlaying ? 'inset 4px 0 0 #3324bc' : '';
  });
}

async function loadPlaybackState() {
  try {
    const res = await fetch('/admin/playback-state');
    if (!res.ok) return;
    const s = await res.json();
    currentState = s;
    updatePlayPauseBtn(s.playing);
    updateNowPlaying(s);
    updateBumpLoopBtn(s.bumpLoopMode);
    if (s.playing) startCountdown();
    highlightCurrentRow();
  } catch (err) {
    console.error('Error loading playback state:', err);
  }
}

async function loadQueue() {
  try {
    const res = await fetch('/admin/queue-data');
    if (!res.ok) return;
    const items = await res.json();
    const tbody = document.getElementById('queueTable');
    tbody.innerHTML = '';

    const countEl = document.getElementById('queue-count');
    if (countEl) countEl.textContent = items.length ? `${items.length} item${items.length === 1 ? '' : 's'}` : '';

    if (items.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="px-8 py-10 text-center text-on-surface-variant">Queue is empty</td></tr>';
      return;
    }

    items.forEach(item => {
      const row = document.createElement('tr');
      row.dataset.queueId = item.id;
      row.className = 'group hover:bg-surface-container-low transition-colors';
      row.innerHTML = `
        <td class="px-4 py-6 text-sm font-medium text-on-surface-variant font-body">${item.id}</td>
        <td class="px-8 py-6">
          <div title="${escapeHtml(item.file_path || '')}" class="cursor-default">
            <div class="text-sm font-medium text-on-surface">${escapeHtml(item.title || item.file_path?.split('/').pop() || '—')}</div>
            ${item.channel ? `<div class="text-xs text-on-surface-variant mt-0.5">${escapeHtml(item.channel)}</div>` : ''}
          </div>
        </td>
        <td class="px-8 py-6 text-sm text-on-surface-variant whitespace-nowrap w-px">${formatDate(item.added_at)}</td>
        <td class="px-4 py-6 text-right">
          <div class="flex items-center justify-end gap-2">
            <a href="${item.url}" target="_blank" class="px-3 py-1.5 text-xs font-semibold text-secondary hover:bg-surface-container rounded-lg transition-all active:scale-95 flex items-center gap-1.5">
              <span class="material-symbols-outlined text-base">visibility</span>
              View
            </a>
            <button onclick="deleteQueueEntry(${item.id}, this)" class="px-3 py-1.5 text-xs font-semibold text-error hover:bg-red-50 rounded-lg transition-all active:scale-95 flex items-center gap-1.5">
              <span class="material-symbols-outlined text-base">delete</span>
              Remove
            </button>
          </div>
        </td>
      `;
      tbody.appendChild(row);
    });
    highlightCurrentRow();
  } catch (err) {
    console.error('Error loading queue:', err);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  loadPlaybackState();
  loadQueue();

  const socket = io();
  socket.on('state', (s) => {
    currentState = s;
    updatePlayPauseBtn(s.playing);
    updateNowPlaying(s);
    updateBumpLoopBtn(s.bumpLoopMode);
    if (s.playing) startCountdown();
    highlightCurrentRow();
  });
});
</script>
</body></html>
