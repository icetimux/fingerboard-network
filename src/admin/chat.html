<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Chat Log</title>
<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-fixed-variant": "#3e446b",
              "surface": "#f8f9ff",
              "secondary-fixed-dim": "#bec4f2",
              "surface-dim": "#ccdbf3",
              "tertiary-fixed-dim": "#ffb784",
              "on-surface-variant": "#454652",
              "outline-variant": "#c5c5d4",
              "primary": "#3324bc",
              "on-primary": "#ffffff",
              "error": "#ba1a1a",
              "surface-container-highest": "#d5e3fc",
              "on-tertiary": "#ffffff",
              "surface-container-low": "#eff4ff",
              "on-secondary-container": "#51577f",
              "secondary-fixed": "#dee0ff",
              "surface-container-high": "#dce9ff",
              "background": "#f8f9ff",
              "tertiary": "#6c3400",
              "on-surface": "#0d1c2e",
              "on-primary-fixed": "#100069",
              "surface-container": "#e6eeff",
              "on-surface-variant-dim": "#757684",
              "on-primary-container": "#d1cdff",
              "inverse-primary": "#c3c0ff",
              "secondary": "#565c84",
              "inverse-surface": "#233144",
              "on-tertiary-fixed-variant": "#713700",
              "inverse-on-surface": "#eaf1ff",
              "on-tertiary-fixed": "#301400",
              "surface-variant": "#d5e3fc",
              "outline": "#757684",
              "on-secondary-fixed": "#12183d",
              "on-secondary": "#ffffff",
              "on-primary-fixed-variant": "#372abf",
              "surface-tint": "#5148d7",
              "on-error": "#ffffff",
              "surface-container-lowest": "#ffffff",
              "on-error-container": "#93000a",
              "tertiary-fixed": "#ffdcc6",
              "primary-container": "#4c43d3",
              "surface-bright": "#f8f9ff",
              "error-container": "#ffdad6",
              "primary-fixed-dim": "#c3c0ff",
              "secondary-container": "#c9cffd",
              "on-background": "#0d1c2e",
              "tertiary-container": "#8f4700",
              "on-tertiary-container": "#ffc7a2",
              "primary-fixed": "#e3dfff"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, .font-manrope { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen">
<!-- SideNavBar Shell -->
<aside class="h-screen w-64 fixed left-0 top-0 border-r border-slate-200 bg-white dark:bg-slate-900 flex flex-col p-6 z-20">
<div class="mb-10">
<h2 class="text-xl font-bold tracking-tight text-on-surface font-manrope">Admin Panel</h2>
</div>
<nav class="flex-1 space-y-2">
<a class="flex items-center gap-3 p-3 text-on-surface-variant hover:bg-surface-container transition-all duration-200 ease-in-out rounded-lg" href="submissions">
<span class="material-symbols-outlined">description</span>
<span class="font-manrope text-sm font-medium">Submissions</span>
</a>
<a class="flex items-center gap-3 p-3 text-on-surface-variant hover:bg-surface-container transition-all duration-200 ease-in-out rounded-lg" href="bumps">
<span class="material-symbols-outlined">movie</span>
<span class="font-manrope text-sm font-medium">Bumps</span>
</a>
<a class="flex items-center gap-3 p-3 text-on-surface-variant hover:bg-surface-container transition-all duration-200 ease-in-out rounded-lg" href="queue">
<span class="material-symbols-outlined">hourglass_empty</span>
<span class="font-manrope text-sm font-medium">Queue</span>
</a>
<a class="flex items-center gap-3 p-3 text-on-surface-variant hover:bg-surface-container transition-all duration-200 ease-in-out rounded-lg" href="stats">
<span class="material-symbols-outlined">bar_chart</span>
<span class="font-manrope text-sm font-medium">Stats</span>
</a>
<a class="flex items-center gap-3 p-3 bg-primary/10 text-primary font-semibold rounded-lg transition-all duration-200 ease-in-out" href="chat">
<span class="material-symbols-outlined">forum</span>
<span class="font-manrope text-sm font-medium">Chat Log</span>
</a>
</nav>
</aside>
<!-- TopNavBar Shell -->
<header class="fixed top-0 right-0 w-[calc(100%-16rem)] z-10 bg-surface/80 backdrop-blur-md flex justify-between items-center px-12 py-4 h-16 border-b border-surface-container">
<div class="flex items-center flex-1"></div>
</header>
<!-- Main Content Canvas -->
<main class="pt-24 pl-64 min-h-screen">
<div class="px-12 max-w-5xl mx-auto">
<!-- Page Header -->
<div class="mb-8 flex items-center justify-between">
<h1 class="text-5xl font-extrabold tracking-tight text-on-surface font-manrope">Chat Log</h1>
<button onclick="loadMessages()" class="flex items-center gap-2 px-5 py-2.5 bg-surface-container-lowest text-on-surface-variant font-semibold rounded-lg shadow-sm hover:bg-surface-container-high transition-all text-sm">
  <span class="material-symbols-outlined text-base">refresh</span> Refresh
</button>
</div>

<!-- Messages table -->
<div class="bg-white rounded-xl border border-outline-variant overflow-hidden shadow-sm">
<table class="w-full text-sm">
  <thead>
    <tr class="border-b border-outline-variant bg-surface-container-low">
      <th class="px-4 py-3 text-left text-xs font-semibold text-on-surface-variant uppercase tracking-wider w-16">ID</th>
      <th class="px-4 py-3 text-left text-xs font-semibold text-on-surface-variant uppercase tracking-wider w-32">User</th>
      <th class="px-4 py-3 text-left text-xs font-semibold text-on-surface-variant uppercase tracking-wider">Message</th>
      <th class="px-4 py-3 text-left text-xs font-semibold text-on-surface-variant uppercase tracking-wider whitespace-nowrap w-px">Time</th>
      <th class="px-4 py-3 text-left text-xs font-semibold text-on-surface-variant uppercase tracking-wider w-20">Actions</th>
    </tr>
  </thead>
  <tbody id="chat-tbody">
    <tr><td colspan="5" class="px-4 py-8 text-center text-on-surface-variant">Loading...</td></tr>
  </tbody>
</table>
</div>

<!-- Empty state -->
<p id="empty-state" class="hidden text-center text-on-surface-variant py-12">No messages yet.</p>
</div>
</main>

<!-- Error modal -->
<div id="error-modal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
  <div class="bg-white rounded-xl p-6 max-w-sm w-full shadow-xl">
    <h3 class="font-manrope font-bold text-on-surface mb-2">Error</h3>
    <p id="error-msg" class="text-sm text-on-surface-variant mb-4"></p>
    <button onclick="closeErrorModal()" class="px-4 py-2 bg-primary text-on-primary rounded-lg text-sm font-semibold">OK</button>
  </div>
</div>

<script>
function escapeHtml(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showError(msg) {
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error-modal').classList.remove('hidden');
}

function closeErrorModal() {
  document.getElementById('error-modal').classList.add('hidden');
}

function formatTime(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

async function deleteMessage(id) {
  if (!confirm('Delete this message? It will be removed for all connected viewers immediately.')) return;
  try {
    const res = await fetch(`/admin/chat/${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error((await res.json()).error || 'Failed');
    document.getElementById(`msg-row-${id}`)?.remove();
    const tbody = document.getElementById('chat-tbody');
    if (!tbody.querySelector('tr[id]')) {
      tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-8 text-center text-on-surface-variant">No messages.</td></tr>';
    }
  } catch (err) {
    showError(err.message);
  }
}

async function loadMessages() {
  const tbody = document.getElementById('chat-tbody');
  tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-8 text-center text-on-surface-variant">Loading...</td></tr>';
  try {
    const res = await fetch('/admin/chat-data');
    if (!res.ok) throw new Error('Failed to load messages');
    const messages = await res.json();

    if (!messages.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-8 text-center text-on-surface-variant">No messages yet.</td></tr>';
      return;
    }

    tbody.innerHTML = '';
    messages.forEach(msg => {
      const tr = document.createElement('tr');
      tr.id = `msg-row-${msg.id}`;
      tr.className = 'border-b border-outline-variant last:border-0 hover:bg-surface-container-low transition-colors';
      tr.innerHTML = `
        <td class="px-4 py-3 text-on-surface-variant text-xs w-16">${escapeHtml(msg.id)}</td>
        <td class="px-4 py-3 w-32">
          <span class="font-semibold text-xs ${escapeHtml(msg.color || 'text-primary')}">${escapeHtml(msg.user)}</span>
        </td>
        <td class="px-4 py-3 text-on-surface text-sm break-words max-w-xs">${escapeHtml(msg.text)}</td>
        <td class="px-4 py-3 text-on-surface-variant text-xs whitespace-nowrap w-px">${formatTime(msg.timestamp)}</td>
        <td class="px-4 py-3 w-20">
          <button onclick="deleteMessage(${msg.id})" class="flex items-center gap-1 px-2.5 py-1.5 bg-error-container text-on-error-container text-xs font-semibold rounded-lg hover:opacity-80 transition-opacity">
            <span class="material-symbols-outlined text-sm">delete</span>
          </button>
        </td>`;
      tbody.appendChild(tr);
    });
  } catch (err) {
    showError(err.message);
  }
}

// Live: when a message is deleted elsewhere, remove it here too
const socket = io();
socket.on('chat:delete', ({ id }) => {
  document.getElementById(`msg-row-${id}`)?.remove();
});
// When a new message comes in, prepend it to the table
socket.on('chat:message', (msg) => {
  const tbody = document.getElementById('chat-tbody');
  // Remove "no messages" placeholder if present
  const placeholder = tbody.querySelector('tr:not([id])');
  if (placeholder) placeholder.remove();

  const tr = document.createElement('tr');
  tr.id = `msg-row-${msg.id}`;
  tr.className = 'border-b border-outline-variant last:border-0 hover:bg-surface-container-low transition-colors';
  tr.innerHTML = `
    <td class="px-4 py-3 text-on-surface-variant text-xs w-16">${escapeHtml(msg.id)}</td>
    <td class="px-4 py-3 w-32">
      <span class="font-semibold text-xs ${escapeHtml(msg.color || 'text-primary')}">${escapeHtml(msg.user)}</span>
    </td>
    <td class="px-4 py-3 text-on-surface text-sm break-words max-w-xs">${escapeHtml(msg.text)}</td>
    <td class="px-4 py-3 text-on-surface-variant text-xs whitespace-nowrap w-px">${formatTime(msg.timestamp)}</td>
    <td class="px-4 py-3 w-20">
      <button onclick="deleteMessage(${msg.id})" class="flex items-center gap-1 px-2.5 py-1.5 bg-error-container text-on-error-container text-xs font-semibold rounded-lg hover:opacity-80 transition-opacity">
        <span class="material-symbols-outlined text-sm">delete</span>
      </button>
    </td>`;
  tbody.insertBefore(tr, tbody.firstChild);
});

document.addEventListener('DOMContentLoaded', loadMessages);
</script>
</body></html>
