        }

<script>
// ========== CHAT FUNCTIONALITY ==========
let socket;
let userUsername;
let userColor;

// Color palette for usernames
const colorPalette = [
  'text-primary-fixed',
  'text-secondary-fixed',
  'text-tertiary-fixed',
  'text-primary',
  'text-secondary',
  'text-error'
];

function initChat() {
  socket = io();

  // On connection, get assigned color
  socket.on('user:color', (data) => {
    userColor = data.color;
    userUsername = `Anonymous ${socket.id.substring(0, 5)}`;
    
    // Update username display with assigned color
    const usernameDisplay = document.getElementById('username-display');
    usernameDisplay.textContent = userUsername.toUpperCase();
    usernameDisplay.className = `text-[10px] font-bold uppercase tracking-[0.1em] ${userColor} ml-0.5`;
    
    console.log(`Connected as: ${userUsername} with color: ${userColor}`);
  });

  // Receive chat history on connect
  socket.on('chat:history', (messages) => {
    const chatMessages = document.getElementById('chat-messages');
    chatMessages.innerHTML = ''; // Clear placeholder
    
    messages.forEach((msg) => {
      displayChatMessage(msg.user, msg.text, false, msg.color);
    });
  });

  // Listen for chat messages from other users
  socket.on('chat:message', (msg) => {
    displayChatMessage(msg.user, msg.text, false, msg.color);
  });

  // Listen for system messages from server (user-only messages)
  socket.on('chat:system', (msg) => {
    displayChatMessage('System', msg.text, true);
  });

  socket.on('state', handleState);

  // Handle Enter key in input
  const chatInput = document.getElementById('chat-input');
  chatInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && chatInput.value.trim()) {
      const messageText = chatInput.value.trim();
      
      // Send to server
      socket.emit('chat:message', {
        user: userUsername,
        text: messageText,
        timestamp: Date.now()
      });
      
      // Clear input
      chatInput.value = '';
    }
  });
}

function displayChatMessage(username, text, isSystem, color) {
  const chatMessages = document.getElementById('chat-messages');
  
  const messageDiv = document.createElement('div');
  messageDiv.className = 'space-y-1';
  
  const usernameEl = document.createElement('p');
  usernameEl.className = `text-[11px] font-bold ${isSystem ? 'text-on-surface-variant' : (color || 'text-primary')} opacity-70`;
  usernameEl.textContent = username;
  
  const textEl = document.createElement('p');
  textEl.className = 'text-sm text-on-surface/90 leading-relaxed';
  textEl.textContent = text;
  
  messageDiv.appendChild(usernameEl);
  messageDiv.appendChild(textEl);
  
  chatMessages.appendChild(messageDiv);
  
  // Auto-scroll to bottom
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

// Initialize chat when page loads
window.addEventListener('DOMContentLoaded', initChat);

// ========== VIDEO PLAYER ==========
let video;
let currentFilePath = null;

function handleState(state) {
  if (!state.filePath) return;

  if (currentFilePath !== state.filePath) {
    currentFilePath = state.filePath;
    video.src = state.filePath;
    video.load();
    video.addEventListener('loadedmetadata', () => {
      const elapsed = state.playing
        ? (Date.now() - state.startedAt) / 1000
        : state.pausedAt;
      video.currentTime = Math.max(0, elapsed);
      if (state.playing) video.play().catch(() => {});
    }, { once: true });
  } else {
    const elapsed = state.playing
      ? (Date.now() - state.startedAt) / 1000
      : state.pausedAt;
    video.currentTime = Math.max(0, elapsed);
    if (state.playing) {
      video.play().catch(() => {});
    } else {
      video.pause();
    }
  }
}

window.addEventListener('DOMContentLoaded', () => {
  video = document.getElementById('player');

  // Volume
  const volumeBtn = document.getElementById('volume_up');
  const volumeIcon = volumeBtn?.querySelector('span');
  const volumeSlider = document.getElementById('volume_range');
  // Sync icon and slider with initial mute state (video starts muted for autoplay)
  if (volumeIcon) volumeIcon.textContent = video.muted ? 'volume_off' : 'volume_up';
  if (volumeSlider) volumeSlider.value = video.muted ? 0 : video.volume * 100;
  if (volumeBtn) {
    volumeBtn.addEventListener('click', () => {
      video.muted = !video.muted;
      if (!video.muted && (!volumeSlider || volumeSlider.value === '0')) {
        video.volume = 0.5;
        if (volumeSlider) volumeSlider.value = 50;
      }
      if (volumeSlider && video.muted) volumeSlider.value = 0;
      if (volumeIcon) volumeIcon.textContent = video.muted ? 'volume_off' : 'volume_up';
    });
  }
  if (volumeSlider) {
    volumeSlider.addEventListener('input', (e) => {
      video.volume = e.target.value / 100;
      video.muted = e.target.value === '0';
      if (volumeIcon) volumeIcon.textContent = video.muted ? 'volume_off' : 'volume_up';
    });
  }

  // Fullscreen
  const fullscreenBtn = document.querySelector('#fullscreen')?.parentElement;
  if (fullscreenBtn) {
    fullscreenBtn.addEventListener('click', () => {
      const container = document.getElementById('main-content');
      if (!document.fullscreenElement) {
        container.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    });
  }
});
</script>
